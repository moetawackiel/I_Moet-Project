<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Absensi AM</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 font-sans">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-lg overflow-hidden">
        <div class="bg-teal-600 p-6 text-white text-center">
            <h1 class="text-xl font-bold">ABSENSI DIGITAL AM 2026</h1>
            <p class="text-sm opacity-80">MIS MIDRARUL ULUM</p>
        </div>

        <div class="p-6 space-y-4">
            <!-- Pilihan Sesi & Mapel -->
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Pengaturan Sesi</label>
                <div class="grid grid-cols-2 gap-2">
                    <select id="sesi" class="w-full p-3 bg-gray-50 border rounded-xl text-sm focus:ring-2 focus:ring-teal-500 outline-none">
                        <option value="Sesi 1">Sesi 1</option>
                        <option value="Sesi 2">Sesi 2</option>
                    </select>
                    <input type="text" id="mapel" placeholder="Mata Pelajaran" class="w-full p-3 bg-gray-50 border rounded-xl text-sm focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
            </div>

            <!-- Area Scanner -->
            <div id="reader" class="rounded-2xl overflow-hidden border-2 border-dashed border-gray-200"></div>

            <!-- Status & Tombol OK -->
            <div id="status-container" class="hidden space-y-3">
                <div id="status" class="p-4 rounded-2xl text-center font-bold"></div>
                <button id="btn-ok" onclick="resetScanner()" class="w-full py-4 bg-teal-600 text-white rounded-2xl font-bold shadow-lg hover:bg-teal-700 active:scale-95 transition-all">
                    OK / SCAN BERIKUTNYA
                </button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxbiPlgHfF_bfxAM5_JSZWkBssReRghAUmLO2Fd_M5n3elcrl_5-ndaD9gxCXnWK8qoNA/exec";
        
        let isProcessing = false;

        function onScanSuccess(decodedText) {
            if (isProcessing) return; 

            const mapel = document.getElementById('mapel').value;
            const sesi = document.getElementById('sesi').value;

            if(!mapel) {
                alert("Harap isi Mata Pelajaran dulu!");
                return;
            }

            isProcessing = true; 

            const statusContainer = document.getElementById('status-container');
            const statusDiv = document.getElementById('status');
            const btnOk = document.getElementById('btn-ok');

            // Tampilkan container status
            statusContainer.classList.remove('hidden');
            btnOk.classList.add('hidden'); // Sembunyikan tombol OK saat loading

            statusDiv.className = "p-4 rounded-2xl text-center font-bold bg-blue-100 text-blue-700";
            statusDiv.innerText = "Mengirim data: " + decodedText + "...";

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    nomorUjian: decodedText,
                    namaSiswa: "Terdeteksi System",
                    sesi: sesi,
                    mapel: mapel
                })
            }).then(() => {
                statusDiv.className = "p-4 rounded-2xl text-center font-bold bg-green-100 text-green-700";
                statusDiv.innerText = "BERHASIL: " + decodedText;
                btnOk.classList.remove('hidden'); // Munculkan tombol OK setelah sukses
            }).catch(err => {
                alert("Gagal kirim. Cek internet!");
                isProcessing = false;
            });
        }

        function resetScanner() {
            // Sembunyikan container status dan buka kunci scanner
            document.getElementById('status-container').classList.add('hidden');
            isProcessing = false;
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
