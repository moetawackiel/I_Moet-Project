<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Absensi AM</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 font-sans">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-lg overflow-hidden">
        <div class="bg-teal-600 p-6 text-white text-center">
            <h1 class="text-xl font-bold">ABSENSI DIGITAL AM</h1>
            <p class="text-sm opacity-80">Scan Kartu Ujian Siswa</p>
        </div>

        <div class="p-6 space-y-4">
            <!-- Pilihan Sesi & Mapel -->
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Pengaturan Sesi</label>
                <div class="grid grid-cols-2 gap-2">
                    <select id="sesi" class="w-full p-3 bg-gray-50 border rounded-xl text-sm focus:ring-2 focus:ring-teal-500 outline-none">
                        <option value="Sesi 1">Sesi 1</option>
                        <option value="Sesi 2">Sesi 2</option>
                    </select>
                    <input type="text" id="mapel" placeholder="Mata Pelajaran" class="w-full p-3 bg-gray-50 border rounded-xl text-sm focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
            </div>

            <!-- Area Scanner -->
            <div id="reader" class="rounded-2xl overflow-hidden border-2 border-dashed border-gray-200"></div>

            <div id="status" class="hidden p-4 rounded-2xl text-center font-bold"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcuO9getXw5sCDth9lzbE-o-2zqfaINrLPIqjtv2hL_spYjyi3YVDNnr6rBosNEgcIIg/exec";

        function onScanSuccess(decodedText) {
            const statusDiv = document.getElementById('status');
            const mapel = document.getElementById('mapel').value;
            const sesi = document.getElementById('sesi').value;

            if(!mapel) {
                alert("Harap isi Mata Pelajaran dulu!");
                return;
            }

            statusDiv.classList.remove('hidden', 'bg-green-100', 'text-green-700');
            statusDiv.classList.add('bg-blue-100', 'text-blue-700');
            statusDiv.innerText = "Mengirim data: " + decodedText + "...";

            // Mengirim data ke Google Sheets
            // Mengirim data ke Google Sheets
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // TAMBAHKAN INI agar tidak error CORS
                headers: {
                    'Content-Type': 'text/plain', // Gunakan text/plain untuk Google Apps Script
                },
                body: JSON.stringify({
                    nomorUjian: decodedText,
                    namaSiswa: "Terdeteksi System", 
                    sesi: sesi,
                    mapel: mapel
                })
            }).then(() => {
                statusDiv.classList.replace('bg-blue-100', 'bg-green-100');
                statusDiv.classList.replace('text-blue-700', 'text-green-700');
                statusDiv.innerText = "BERHASIL: " + decodedText;
                
                // Beri jeda agar tidak scan berkali-kali secara tidak sengaja
                setTimeout(() => { statusDiv.classList.add('hidden'); }, 3000);
            }).catch(err => {
                alert("Gagal mengirim data. Cek koneksi internet.");
            });
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
